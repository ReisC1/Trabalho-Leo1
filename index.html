<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindAcademy — Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#1A6B4A;--green2:#24966A;--lime:#B8F0D4;
  --dark:#0E1A14;--muted:#6B8070;--white:#FFFFFF;
}
html { scroll-behavior: smooth; }
body { font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden; }
.slide { min-height:100vh;width:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 40px;position:relative;opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s;}
.slide.visible{opacity:1;transform:translateY(0);}
#progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--lime);width:0%;transition:.4s;z-index:100;}
#nav-dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:100;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.3s;}
.dot.active{background:var(--lime);transform:scale(1.4);}
.section-tag{font-family:'Syne';font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--green2);text-transform:uppercase;margin-bottom:20px;}
.slide-title{font-family:'Syne';font-size:clamp(32px,5vw,58px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;max-width:700px;text-align:center;}
.slide-title em{color:var(--lime);font-style:normal;}

</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="nav-dots">
  <div class="dot active" onclick="goTo(0)"></div>
  <div class="dot" onclick="goTo(1)"></div>
  <div class="dot" onclick="goTo(2)"></div>
  <div class="dot" onclick="goTo(3)"></div>
  <div class="dot" onclick="goTo(4)"></div>
  <div class="dot" onclick="goTo(5)"></div>
</div>

<div class="slides">

</div>

<div class="narr-box" id="narr-box">
  <span id="narr-label">🎙 Capa — MindAcademy</span>
  <span id="narr-text">Role para baixo ou use as setas do teclado para navegar pelo pitch.</span>
</div>


<audio id="audio-player" preload="auto"></audio>

<script>
const slides = document.querySelectorAll('.slide');
const dots   = document.querySelectorAll('.dot');
const bar    = document.getElementById('progress-bar');
const narrLabel = document.getElementById('narr-label');
const narrText  = document.getElementById('narr-text');


const audio = document.getElementById('audio-player');

const audios = [
  "audio0.mp3",
  "audio1.mp3",
  "audio2.mp3",
  "audio3.mp3",
  "audio4.mp3",
  "audio5.mp3"
];

const narrations = [
  { label:'🎙 Capa — MindAcademy', text:'Role para baixo ou use as setas do teclado para navegar pelo pitch.' },
  { label:'🎙 Narração — Cena 1', text:'...' },
  { label:'🎙 Narração — Cena 2', text:'...' },
  { label:'🎙 Narração — Cena 3', text:'...' },
  { label:'🎙 Narração — Cena 4', text:'...' },
  { label:'🎙 Narração — Cena 5', text:'...' }
];

let current = 0;


function updateUI(idx) {
  bar.style.width = ((idx + 1) / slides.length * 100) + '%';
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  narrLabel.textContent = narrations[idx].label;
  narrText.textContent  = narrations[idx].text;

  if (audios[idx]) {
    audio.src = audios[idx];
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }
}

function goTo(idx) {
  current = idx;
  slides[idx].scrollIntoView({ behavior: 'smooth' });
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      const idx = Array.from(slides).indexOf(e.target);
      if (idx !== -1) { current = idx; updateUI(idx); }
    }
  });
}, { threshold: 0.4 });

slides.forEach(s => observer.observe(s));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') goTo(Math.min(current + 1, slides.length - 1));
  if (e.key === 'ArrowUp')   goTo(Math.max(current - 1, 0));
});

function switchTab(name) {
  document.querySelectorAll('.sga-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sga-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.sga-tab[onclick="switchTab('${name}')"]`)?.classList.add('active');
  document.getElementById('tab-' + name)?.classList.add('active');
}

function submitApoio() {
  document.getElementById('apoio-form').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
}

updateUI(0);
</script>

</body>
</html>
